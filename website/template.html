<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}} — Doikayt</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <aside class="sidebar">
    <a href="/" class="logo-wrap">
      <img src="/logo.png" alt="Doikayt" class="logo">
    </a>
    <nav>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/projects.html">Projects</a></li>
        <li><a href="/careers.html">Careers</a></li>
        <li><a href="https://wiki.doikayt.org" target="_blank" rel="noopener">Wiki ↗</a></li>
      </ul>
    </nav>
  </aside>
  <div class="page">
    <main>
      <h1>{{PAGE_TITLE}}</h1>
      {{TABS}}
      {{BODY}}
    </main>
    <footer>
      <p>Doikayt &middot; <a href="https://github.com/doikayt/qwiki">github.com/doikayt/qwiki</a> &middot; {{BUILD_COMMIT_LINK}}</p>
    </footer>
  </div>
  <script>
    // Point wiki.doikayt.org links at the local docker wiki (port 8080) when
    // this site itself is being previewed locally, instead of always jumping
    // out to the production droplet.
    (function () {
      var isLocal = /^(localhost|127\.0\.0\.1)$/.test(location.hostname);
      if (!isLocal) { return; }
      document.querySelectorAll('a[href^="https://wiki.doikayt.org"]').forEach(function (a) {
        a.href = a.href.replace('https://wiki.doikayt.org', 'http://localhost:8080');
      });
    })();
  </script>
</body>
</html>
